model:
  random_state: 42
  test_size: 0.2
  n_estimators: 100

features:
  - monthly_spend
  - login_count
  - tenure_days

target: churn

required_columns:
  - customer_id
  - monthly_spend
  - login_count
  - tenure_days
  - churn

column_types:
  monthly_spend: float
  login_count: int
  tenure_days: int
  churn: int

range_rules:
  monthly_spend:
    min: 0.0
  login_count:
    min: 0
  tenure_days:
    min: 0
  churn:
    min: 0
    max: 1

paths:
  raw_data: data/raw/customers.csv
  daily_data: data/raw/customers_daily.csv
  model_dir: models/
  prediction_dir: data/predictions/
  log_file: logs/pipeline.log

mlflow:
  experiment_name: churn-prediction
  tracking_uri: mlruns

# GCP settings (Phase 2 — fill in your project details)
gcp:
  project_id: YOUR_PROJECT_ID
  bucket_name: YOUR_BUCKET_NAME
  region: us-central1
